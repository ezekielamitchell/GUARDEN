[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0

build_flags =
    -DBOARD_HAS_PSRAM=0
    -DCORE_DEBUG_LEVEL=0

; Optimize for size — ESP32-C3 has 400KB RAM
build_unflags =
    -Os
build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=0
