# Mosquitto MQTT Broker Config — GUARDEN
# Place at: /etc/mosquitto/conf.d/guarden.conf

# Listen on all interfaces (Pi AP + loopback)
listener 1883 0.0.0.0

# Allow anonymous connections from local network
allow_anonymous true

# Logging
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type information

# Persistence
persistence true
persistence_location /var/lib/mosquitto/

# Connection limits
max_connections 20
max_keepalive 60
